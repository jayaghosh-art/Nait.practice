<!DOCTYPE html>
<html>

<head>
    <title>HTML Elements Practice</title>
</head>

<body>

    <!-- Heading Tags -->
    <h1>Main Heading</h1>
    <h2>Sub Heading</h2>
    <h3>Smaller Heading</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

    <hr>

    <!-- Paragraph -->
    <p>
        This is a simple paragraph written in HTML.
        HTML is used to create webpages and display content in a browser.
    </p>

    <hr>

    <!-- Text Formatting -->
    <h2>Text Formatting</h2>

    <p>
        <b>Bold Text</b><br>
        <i>Italic Text</i><br>
        <u>Underlined Text</u><br>
        <mark>Highlighted Text</mark><br>
        <small>Small Text</small><br>
        <del>Deleted Text</del><br>
        H<sub>2</sub>O<br>
        x<sup>2</sup> + y<sup>2</sup>
    </p>

    <hr>

</body>

</html>
